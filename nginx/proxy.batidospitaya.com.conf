server {
    listen 80;
    server_name proxy.batidospitaya.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name proxy.batidospitaya.com;

    # SSL — Certificado Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/proxy.batidospitaya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proxy.batidospitaya.com/privkey.pem;

    # Timeouts para Access haciendo polling constante desde sucursales
    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # Logs separados para monitorear tráfico por sucursal
    access_log /var/log/nginx/proxy-batidospitaya-access.log;
    error_log  /var/log/nginx/proxy-batidospitaya-error.log;

    location / {
        proxy_pass https://api.batidospitaya.com;
        proxy_set_header Host api.batidospitaya.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
}
